name: chat_app_poc
description: "HIPAA-compliant medical chat application."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.7.0
  connectivity_plus: ^6.1.3
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.3
  intl: ^0.19.0
  flutter_timezone: ^4.1.0
  fl_chart: ^0.71.0

  # Chat app dependencies
  socket_io_client: ^3.0.2
  sqflite_sqlcipher: ^3.1.0+1
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1
  flutter_image_compress: ^2.3.0
  record: ^6.0.0
  file_picker: ^8.1.6
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  photo_view: ^0.15.0
  audioplayers: ^6.1.0
  path: ^1.9.1
  mime: ^2.0.0
  flutter_local_notifications: ^18.0.1
  flutter_dotenv: ^6.0.0
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/.env

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-VariableFont.ttf
    - family: MontserratRegular
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-VariableFont.ttf
